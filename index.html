<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>300-Day Roadmap to 20 LPA | AI/ML & SDE Track</title>
    <meta name="description" content="Day-by-day micro-detailed roadmap to crack 20+ LPA package. DSA, AI/ML, Projects, Interview Prep — every single day planned.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- Header -->
    <header id="main-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <span class="logo-text">300<span class="logo-accent">Days</span></span>
            </div>
            <nav class="header-nav">
                <button class="nav-btn" id="btn-reset" title="Reset Progress">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                </button>
                <button class="nav-btn theme-toggle" id="btn-theme" title="Toggle Theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="hero">
        <div class="hero-content">
            <div class="hero-badge">🎯 10-Month AI/ML & SDE Career Plan</div>
            <h1 class="hero-title">
                <span class="hero-line">Your <span class="gradient-text">Day-by-Day</span></span>
                <span class="hero-line">Roadmap to <span class="gradient-text-2">20 LPA</span></span>
            </h1>
            <p class="hero-subtitle">304 days. Every topic. Every resource. Zero guesswork.<br>From basic Python to cracking top-tier placements.</p>
            <div class="hero-stats">
                <div class="hero-stat">
                    <span class="hero-stat-number" id="stat-total">304</span>
                    <span class="hero-stat-label">Total Days</span>
                </div>
                <div class="hero-stat-divider"></div>
                <div class="hero-stat">
                    <span class="hero-stat-number" id="stat-completed">0</span>
                    <span class="hero-stat-label">Completed</span>
                </div>
                <div class="hero-stat-divider"></div>
                <div class="hero-stat">
                    <span class="hero-stat-number" id="stat-percent">0%</span>
                    <span class="hero-stat-label">Progress</span>
                </div>
                <div class="hero-stat-divider"></div>
                <div class="hero-stat">
                    <span class="hero-stat-number" id="stat-streak">0</span>
                    <span class="hero-stat-label">Day Streak 🔥</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Progress Bar -->
    <section id="progress-section">
        <div class="progress-container">
            <div class="progress-bar-wrapper">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                    <div class="progress-glow" id="progress-glow"></div>
                </div>
                <div class="progress-milestones" id="progress-milestones"></div>
            </div>
        </div>
    </section>

    <!-- Filters -->
    <section id="filters-section">
        <div class="filters-container">
            <div class="filter-row">
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-input" placeholder="Search topics, e.g. 'binary search', 'neural network'...">
                </div>
                <div class="filter-toggles">
                    <button class="filter-chip active" data-filter="all" id="filter-all">All Days</button>
                    <button class="filter-chip" data-filter="incomplete" id="filter-incomplete">⬜ Remaining</button>
                    <button class="filter-chip" data-filter="complete" id="filter-complete">✅ Completed</button>
                </div>
            </div>
            <div class="month-tabs" id="month-tabs"></div>
            <div class="category-pills" id="category-pills"></div>
        </div>
    </section>

    <!-- Days Grid -->
    <main id="days-container">
        <div class="days-grid" id="days-grid"></div>
        <div class="no-results" id="no-results" style="display:none;">
            <span class="no-results-icon">🔍</span>
            <p>No days match your search</p>
        </div>
    </main>

    <!-- Today Indicator -->
    <button class="fab-today" id="fab-today" title="Jump to Today">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Today</span>
    </button>

    <!-- Day Detail Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="day-modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-header">
                <span class="modal-day-badge" id="modal-day-badge"></span>
                <span class="modal-category-badge" id="modal-category-badge"></span>
            </div>
            <h2 class="modal-title" id="modal-title"></h2>
            <div class="modal-date" id="modal-date"></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-actions">
                <button class="btn-complete" id="modal-complete-btn">
                    <span class="btn-complete-text"></span>
                </button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
